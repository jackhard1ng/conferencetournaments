:root{
  --bg:#06090f;--sf:#0d1420;--sf2:#131d30;--sfh:#1a2844;
  --bd:#1a2640;--bdh:#2a3d60;
  --tx:#e4eaf4;--dm:#6b7fa0;--dmr:#3d506e;
  --gd:#f0a820;--gdg:rgba(240,168,32,.2);
  --gn:#22c55e;--gng:rgba(34,197,94,.12);
  --rd:#ef4444;--rdg:rgba(239,68,68,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

.hdr{text-align:center;padding:1.4rem 1rem .6rem;position:relative}
.hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% -20%,rgba(240,168,32,.07) 0%,transparent 65%);pointer-events:none}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.6rem,4.5vw,2.8rem);letter-spacing:.1em;color:var(--gd);line-height:1.1}
.hdr .sub{font-family:'Barlow Condensed',sans-serif;color:var(--dm);font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;margin-top:.15rem}

.ban{text-align:center;padding:.45rem;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;display:none}
.ban.rd{display:block;background:linear-gradient(90deg,transparent,var(--rdg),transparent);color:var(--rd)}
.ban.gn{display:block;background:linear-gradient(90deg,transparent,var(--gng),transparent);color:var(--gn)}

.ubar{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.5rem 1rem;flex-wrap:wrap}
.ubar input{background:var(--sf);border:1px solid var(--bd);color:var(--tx);padding:.4rem .8rem;border-radius:5px;font-family:'Barlow',sans-serif;font-size:.88rem;width:190px;outline:none;transition:border .2s}
.ubar input:focus{border-color:var(--gd)}
.ubar button{background:var(--gd);color:var(--bg);border:none;padding:.4rem 1rem;border-radius:5px;font-family:'Barlow',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:transform .12s,box-shadow .2s}
.ubar button:hover{transform:translateY(-1px);box-shadow:0 4px 14px var(--gdg)}
.st{font-size:.72rem;color:var(--dm)}.st.on{color:var(--gn)}

.vbar{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.3rem 1rem;flex-wrap:wrap;display:none}
.vbar label{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;color:var(--dm);text-transform:uppercase;letter-spacing:.08em}
.vbar select{background:var(--sf);border:1px solid var(--bd);color:var(--tx);padding:.3rem .6rem;border-radius:5px;font-family:'Barlow',sans-serif;font-size:.82rem;outline:none;cursor:pointer}

.tabs{display:flex;justify-content:center;gap:0;padding:0 .4rem;margin:.2rem auto;max-width:780px;border-bottom:2px solid var(--bd);flex-wrap:wrap}
.tab{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.04em;padding:.45rem .8rem;cursor:pointer;color:var(--dm);border-bottom:3px solid transparent;transition:all .15s;user-select:none;position:relative;top:2px}
.tab:hover{color:var(--tx)}.tab.on{color:var(--gd);border-bottom-color:var(--gd)}
.tab.lb{color:var(--gn)}.tab.lb.on{border-bottom-color:var(--gn)}
.tab.adm{color:var(--rd);font-size:.82rem}.tab.adm.on{border-bottom-color:var(--rd)}

.skey{display:flex;justify-content:center;gap:1rem;padding:.35rem 1rem;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;color:var(--dm);flex-wrap:wrap}
.skey b{font-family:'Bebas Neue',sans-serif;font-size:.88rem;color:var(--gd);font-weight:400}

.bv{display:none;padding:.6rem}.bv.on{display:block}
.chdr{text-align:center;padding:.6rem 0 .4rem}
.chdr h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.05em}
.chdr .m{font-family:'Barlow Condensed',sans-serif;color:var(--dm);font-size:.76rem;letter-spacing:.1em;text-transform:uppercase}

.brk{display:flex;align-items:stretch;overflow-x:auto;padding:.6rem 0;gap:0;min-height:320px}
.rnd{display:flex;flex-direction:column;justify-content:space-around;min-width:165px;gap:5px;padding:0 2px}
.rl{font-family:'Barlow Condensed',sans-serif;text-align:center;font-size:.62rem;color:var(--dm);text-transform:uppercase;letter-spacing:.1em;padding-bottom:.25rem;margin-bottom:.15rem;border-bottom:1px solid var(--bd);white-space:nowrap}
.rl b{color:var(--gd);font-weight:600}

.mu{display:flex;flex-direction:column;gap:1px;flex:1;justify-content:center;position:relative}
.mu::after{content:'';position:absolute;right:-2px;top:22%;bottom:22%;width:1px;background:var(--bd)}

.ts{display:flex;align-items:center;gap:.3rem;padding:.28rem .45rem;background:var(--sf);border:1px solid var(--bd);border-radius:3px;cursor:pointer;transition:all .12s;min-height:28px;position:relative;overflow:hidden}
.ts:hover:not(.emp):not(.lk){background:var(--sfh);border-color:var(--gd);transform:translateX(2px)}
.ts.pk{border-color:var(--gn);background:linear-gradient(135deg,var(--gng),var(--sf));box-shadow:inset 3px 0 0 var(--gn)}
.ts.ok{border-color:var(--gn);background:linear-gradient(135deg,rgba(34,197,94,.15),var(--sf));box-shadow:inset 3px 0 0 var(--gn)}
.ts.no{border-color:var(--rd);background:linear-gradient(135deg,var(--rdg),var(--sf));box-shadow:inset 3px 0 0 var(--rd);opacity:.55}
.ts.emp{opacity:.2;cursor:default;border-style:dashed}
.ts.lk{cursor:default}.ts.lk:not(.pk):not(.ok):not(.no){opacity:.4}
.sd{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;color:var(--dm);min-width:14px;text-align:center;font-weight:600}
.tn{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.015em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.badge{font-size:.6rem;font-weight:700;margin-left:auto;flex-shrink:0}
.badge.w{color:var(--gn)}.badge.l{color:var(--rd)}
.pcnt{font-family:'Barlow Condensed',sans-serif;font-size:.55rem;color:var(--dm);margin-left:auto;flex-shrink:0;white-space:nowrap;opacity:.8}
.pcnt.correct{color:var(--gn)}.pcnt.wrong{color:var(--rd)}

.chcol{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:140px;padding:0 6px}
.chcol .tr{font-size:2rem;margin-bottom:.35rem}
.chcol .cl{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;color:var(--dm);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.15rem}
.chcol .cp{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.04em;color:var(--gd);text-align:center;min-height:34px;display:flex;align-items:center;justify-content:center;padding:.35rem .7rem;border:2px solid var(--gd);border-radius:6px;background:rgba(240,168,32,.03);min-width:120px}
.chcol .cp.e{color:var(--dm);border-color:var(--bd);border-style:dashed;background:0;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:400}
.chcol .pl{font-size:.6rem;color:var(--gd);margin-top:.15rem;font-weight:600}

/* ── LEADERBOARD ── */
.lbd{max-width:680px;margin:.6rem auto;padding:0 1rem}
.lbd h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;text-align:center;color:var(--gn);margin-bottom:.6rem}
.lr{display:flex;align-items:center;padding:.55rem .7rem;background:var(--sf);border:1px solid var(--bd);border-radius:5px;margin-bottom:.3rem;gap:.5rem;transition:background .15s}
.lr:hover{background:var(--sf2)}
.lr.f{border-color:var(--gd);background:linear-gradient(135deg,rgba(240,168,32,.05),var(--sf))}
.lrk{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--dm);min-width:26px;text-align:center}
.lr.f .lrk{color:var(--gd)}
.lnm{flex:1;font-weight:600;font-size:.9rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lsc{display:flex;flex-direction:column;align-items:flex-end;gap:.1rem;min-width:90px}
.lsc .pts{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;color:var(--gn)}
.lsc .max{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;color:var(--dm)}
.lcf{display:flex;gap:.25rem;font-family:'Barlow Condensed',sans-serif;font-size:.6rem;color:var(--dm);flex-wrap:wrap}
.lcf span{background:var(--bg);padding:.1rem .28rem;border-radius:2px;white-space:nowrap}

/* ── ADMIN ── */
.adp{max-width:700px;margin:.6rem auto;padding:0 1rem}
.adp h2{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--rd);text-align:center;margin-bottom:.4rem}
.adp .inf{font-size:.78rem;color:var(--dm);text-align:center;margin-bottom:.8rem}
.adc{margin-bottom:1.2rem}
.adc h3{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gd);margin-bottom:.3rem}
.ag{display:flex;align-items:center;gap:.4rem;padding:.3rem 0;border-bottom:1px solid var(--bd);font-size:.78rem;flex-wrap:wrap}
.ag .rd{color:var(--dm);font-family:'Barlow Condensed',sans-serif;min-width:75px;font-size:.68rem}
.ag button{background:var(--sf);border:1px solid var(--bd);color:var(--tx);padding:.2rem .5rem;border-radius:3px;cursor:pointer;font-size:.72rem;font-family:'Barlow Condensed',sans-serif;transition:all .12s}
.ag button:hover{border-color:var(--gd)}
.ag button.s{background:var(--gn);color:var(--bg);border-color:var(--gn);font-weight:700}
.ag button.x{background:var(--rd);color:#fff;border-color:var(--rd);padding:.2rem .35rem}
.ag .wt{color:var(--dmr);font-size:.68rem;font-style:italic}

.nmsg{text-align:center;padding:2rem 1rem;color:var(--dm);font-size:.95rem}
.nmsg strong{color:var(--gd)}

@media(max-width:768px){.rnd{min-width:130px}.tn{font-size:.68rem}.tab{font-size:.88rem;padding:.4rem .55rem}.lcf{display:none}}
::-webkit-scrollbar{height:4px;width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
  </style>
</head>

// ── JOIN ──
function join(){
  const raw=document.getElementById("ni").value.trim();
  if(!raw)return;
  me=raw.toLowerCase().replace(/[^a-z0-9]/g,"_");
  db.ref(`users/${me}/picks`).once("value",s=>{
    picks=s.val()||{};

    document.getElementById("tb").style.display="flex";
    document.getElementById("sk").style.display="flex";

  });
}

  const prev=sl.value||viewing||me;

    if(uid===me)continue;
    const o=document.createElement("option");o.value=uid;o.textContent=d.name||uid;sl.appendChild(o);
  }
  sl.value=prev;
}

  const allL=Object.keys(LK).every(lkd),anyL=Object.keys(LK).some(lkd);
  if(allL){b.className="ban rd";b.textContent="\uD83D\uDD12 All brackets locked \u2014 picks are final";}
  else if(anyL){

    b.className="ban rd";b.textContent=`\uD83D\uDD12 Some locked \u2014 ${open.map(k=>k.toUpperCase()).join(", ")} still open`;
  }else{

    b.textContent=`\uD83D\uDFE2 Picks lock at first tip \u2014 ${d.toLocaleDateString('en-US',{timeZone:'America/Chicago',weekday:'short',month:'short',day:'numeric'})} ${d.toLocaleTimeString('en-US',{timeZone:'America/Chicago',hour:'numeric',minute:'2-digit'})} CT`;
  }
}

// ── RESOLVE ──
function rv(g,i,pk){
  if(g.t[i])return{nm:g.t[i],sd:g.s[i]};
  if(!g.f||!g.f[i])return null;
  const p=pk[g.f[i]];if(p==null)return null;
  return rv(G[g.f[i]],p,pk);
}
function ra(g,i){
  if(g.t[i])return{nm:g.t[i],sd:g.s[i]};
  if(!g.f||!g.f[i])return null;
  const r=res[g.f[i]];if(r==null)return null;
  return ra(G[g.f[i]],r);
}

// ── PICK ──
function mp(gid,i){
  if(!me||viewing!==me)return;
  const g=G[gid];if(!g||lkd(g.ck))return;
  const t0=rv(g,0,picks),t1=rv(g,1,picks);
  if(!t0||!t1||picks[gid]===i)return;
  if(picks[gid]!=null)cd(gid);
  picks[gid]=i;save();rBrk(tab);
}
function cd(gid){for(const g of Object.values(G)){if(g.f&&(g.f[0]===gid||g.f[1]===gid)&&picks[g.id]!=null){delete picks[g.id];cd(g.id);}}}

// ── RENDER BRACKET ──
function rBrk(ck){
  const c=D[ck];if(!c)return;
  const lk=lkd(ck);
  const vp=gvp();const isMe=viewing===me;
  const vn=viewing&&users[viewing]?users[viewing].name:null;

  let h=`<div class="bv on"><div class="chdr"><h2>${c.nm}</h2><div class="m">${c.dt} \u2022 ${c.lc}`;
  if(lk)h+=` \u2022 \uD83D\uDD12 LOCKED`;
  if(!isMe&&vn)h+=` \u2022 Viewing: ${vn}`;
  h+=`</div></div><div class="brk">`;

  c.rs.forEach(r=>{
    h+=`<div class="rnd"><div class="rl">${r.n}<br><b>${r.p}pt${r.p>1?'s':''}</b></div>`;
    r.g.forEach(g=>{
      const t0=rv(g,0,vp),t1=rv(g,1,vp),pk=vp[g.id],rr=res[g.id],rdy=t0&&t1;
      h+=`<div class="mu">${sl(g.id,0,t0,pk,rdy,lk||!isMe,rr)}${sl(g.id,1,t1,pk,rdy,lk||!isMe,rr)}</div>`;
    });
    h+=`</div>`;
  });

  const fid=c.rs[c.rs.length-1].g[0].id,fp=vp[fid];
  let ch=fp!=null?rv(c.rs[c.rs.length-1].g[0],fp,vp):null;
  h+=`<div class="chcol"><div class="tr">\uD83C\uDFC6</div><div class="cl">Champion</div><div class="cp ${ch?'':'e'}">${ch?ch.nm:'TBD'}</div><div class="pl">16 PTS</div></div>`;
  h+=`</div></div>`;
  document.getElementById("ct").innerHTML=h;
}

function sl(gid,i,tm,pk,rdy,lk,rr){
  const emp=!tm,isPk=pk===i,hasR=rr!=null;
  let cls="ts";
  if(emp)cls+=" emp";
  if(lk||!rdy)cls+=" lk";
  if(isPk&&hasR)cls+=rr===i?" ok":" no";
  else if(isPk)cls+=" pk";
  const oc=(!emp&&rdy&&!lk)?` onclick="mp('${gid}',${i})"`:""
  let badge="";
  if(isPk&&hasR)badge=rr===i?`<span class="badge w">\u2713</span>`:`<span class="badge l">\u2717</span>`;
  // Pick count — only show after conference is locked
  let pcnt="";
  const g=G[gid];
  if(g&&lkd(g.ck)&&!emp){
    const counts=getPickCounts(gid);
    if(counts.total>0){
      if(hasR){
        const cls2=rr===i?"correct":"wrong";
        pcnt=`<span class="pcnt ${cls2}">${counts[i]}/${counts.total}</span>`;
      }else{
        pcnt=`<span class="pcnt">${counts[i]}/${counts.total}</span>`;
      }
    }
  }
  return`<div class="${cls}"${oc}><span class="sd">${tm&&tm.sd?tm.sd:""}</span><span class="tn">${tm?tm.nm:"TBD"}</span>${pcnt}${badge}</div>`;
}

// ── PICK COUNTS ──
function getPickCounts(gid){
  let c0=0,c1=0,total=0;
  const src=Object.keys(users).length?users:{};
  for(const[uid,d] of Object.entries(src)){
    const pk=d.picks||{};
    if(pk[gid]===0){c0++;total++;}
    else if(pk[gid]===1){c1++;total++;}
  }
  return{0:c0,1:c1,total};
}

// ── MAX POSSIBLE POINTS ──
// A pick is "still alive" if: the game has no result yet AND the picked team
// hasn't been eliminated by an earlier result in the actual bracket.
function calcMax(pk){
  let tot=0;const bc={};
  for(const[ck,cv] of Object.entries(D)){
    let ct=0;
    for(const r of cv.rs)for(const g of r.g){
      const p=pk[g.id];
      if(p==null)continue; // no pick made
      const rr=res[g.id];

      if(rr!=null){
        // Game decided — award if correct
        const picked=rv(g,p,pk),actual=ra(g,rr);
        if(picked&&actual&&picked.nm===actual.nm)ct+=r.p;
      }else{
        // Game not decided yet — check if the picked team is still alive
        // The picked team is alive if it hasn't been eliminated in any
        // earlier game in the actual results chain
        const pickedTeam=rv(g,p,pk);
        if(pickedTeam&&isStillAlive(pickedTeam.nm,g))ct+=r.p;
      }
    }
    bc[ck]=ct;tot+=ct;
  }
  return{tot,bc};
}

function isStillAlive(teamName, targetGame){
  // Walk the feeder chain for this game. For each feeder that has an actual
  // result, check if the team was in that game and lost.
  // We trace backwards: does the team need to have won a game that it actually lost?
  return checkAlive(teamName, targetGame);
}

function checkAlive(tn, g){
  // For each slot in this game, check if this team needs to come through a feeder
  for(let i=0;i<2;i++){
    if(g.t[i]===tn) return true; // static slot, always alive
    if(g.f&&g.f[i]){
      const fg=G[g.f[i]];
      const rr=res[fg.id];
      if(rr!=null){
        // Feeder decided — did our team win this feeder?
        const winner=ra(fg,rr);
        if(winner&&winner.nm===tn) return true;
        // Check if the team was even in this feeder game
        const t0=ra(fg,0)||(fg.t[0]?{nm:fg.t[0]}:null);
        const t1=ra(fg,1)||(fg.t[1]?{nm:fg.t[1]}:null);
        const wasInGame=(t0&&t0.nm===tn)||(t1&&t1.nm===tn);
        if(wasInGame&&winner&&winner.nm!==tn) return false; // eliminated here
      } else {
        // Feeder not decided — team could still get here, check deeper
        if(checkAlive(tn,fg)) return true;
      }
    }
  }
  return false;
}

// ── CURRENT SCORE (earned) ──
function calcEarned(pk){
  let tot=0;const bc={};
  for(const[ck,cv] of Object.entries(D)){let ct=0;
    for(const r of cv.rs)for(const g of r.g){
      const p=pk[g.id],rr=res[g.id];
      if(p==null||rr==null)continue;
      const picked=rv(g,p,pk),actual=ra(g,rr);
      if(picked&&actual&&picked.nm===actual.nm)ct+=r.p;
    }bc[ck]=ct;tot+=ct;
  }return{tot,bc};
}

// ── STANDINGS ──
function rStand(){
  let ents=[];
  const src=Object.keys(users).length?users:(me?{[me]:{picks,name:document.getElementById("ni").value.trim()}}:{});
  for(const[uid,d] of Object.entries(src)){
    const pk=d.picks||{};
    const earned=calcEarned(pk);
    const max=calcMax(pk);
    ents.push({nm:d.name||uid,pts:earned.tot,bc:earned.bc,mx:max.tot,mbc:max.bc});
  }
  ents.sort((a,b)=>b.pts-a.pts||b.mx-a.mx||a.nm.localeCompare(b.nm));

  let h=`<div class="bv on"><div class="lbd"><h2>\uD83C\uDFC6 Standings</h2>`;
  if(!ents.length)h+=`<div class="nmsg">No participants yet!</div>`;
  else ents.forEach((e,i)=>{
    h+=`<div class="lr ${i===0?'f':''}">
      <div class="lrk">${i+1}</div>
      <div class="lnm">${e.nm}</div>
      <div class="lcf">
        <span>ACC ${e.bc.acc||0}</span><span>B12 ${e.bc.big12||0}</span><span>B10 ${e.bc.bigten||0}</span><span>BE ${e.bc.bigeast||0}</span><span>SEC ${e.bc.sec||0}</span>
      </div>
      <div class="lsc">
        <div class="pts">${e.pts}</div>
        <div class="max">max ${e.mx}</div>
      </div>
    </div>`;
  });
  h+=`</div></div>`;document.getElementById("ct").innerHTML=h;
}

// ── ADMIN ──
function rAdmin(){
  let h=`<div class="bv on"><div class="adp"><h2>\uD83D\uDD27 Admin \u2014 Enter Results</h2><div class="inf">Click the winning team as games finish. Grades all brackets instantly.</div>`;
  for(const[ck,cv] of Object.entries(D)){
    h+=`<div class="adc"><h3>${cv.nm}</h3>`;
    for(const r of cv.rs)for(const g of r.g){
      const t0=ra(g,0)||(g.t[0]?{nm:g.t[0],sd:g.s[0]}:null);
      const t1=ra(g,1)||(g.t[1]?{nm:g.t[1],sd:g.s[1]}:null);
      const rr=res[g.id],rdy=t0&&t1;
      h+=`<div class="ag"><span class="rd">${r.n} \u2022 ${r.p}pt</span>`;
      if(rdy){
        h+=`<button class="${rr===0?'s':''}" onclick="sr('${g.id}',0)">(${t0.sd}) ${t0.nm}</button>`;
        h+=`<button class="${rr===1?'s':''}" onclick="sr('${g.id}',1)">(${t1.sd}) ${t1.nm}</button>`;
        if(rr!=null)h+=`<button class="x" onclick="cr('${g.id}')">\u2717</button>`;
      }else h+=`<span class="wt">Waiting...</span>`;
      h+=`</div>`;
    }h+=`</div>`;
  }h+=`</div></div>`;document.getElementById("ct").innerHTML=h;
}

function sr(gid,w){db.ref(`results/${gid}`).set(w);}
function cr(gid){
  const up={};up[gid]=null;
  (function clrD(id){for(const g of Object.values(G)){if(g.f&&(g.f[0]===id||g.f[1]===id)&&res[g.id]!=null){up[g.id]=null;clrD(g.id);}}})(gid);
  db.ref("results").update(up);
}
